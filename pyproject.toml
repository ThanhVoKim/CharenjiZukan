[project]
name = "videocolab"
version = "0.1.0"
description = "Video translation and dubbing tools for Google Colab"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "google-genai>=0.3.0",
    "tenacity>=8.0.0",
    "edge-tts>=6.1.0",
    "pydub>=0.25.0",
    "pyrubberband>=0.3.0",
    "soundfile>=0.12.0",
    "aiohttp>=3.8.0",
    "numpy>=1.20.0",
]

[project.scripts]
translate-srt = "translate_srt:main"
tts-srt = "tts_srt:main"

[tool.uv]
dev-dependencies = []

[tool.uv.scripts]
translate = "python translate_srt.py"
tts = "python tts_srt.py"