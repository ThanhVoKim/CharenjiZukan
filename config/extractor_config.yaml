# Video Subtitle Extractor Configuration
# Cấu hình cho việc trích xuất subtitle tiếng Trung từ video
# Lưu ý: Các tham số chưa có ở đây có thể thêm trực tiếp qua CLI parameters.

# Video processing settings
video:
  # Frame sampling: lấy mỗi N frame (mặc định 30 = mỗi giây với video 30fps)
  frame_interval: 1

# Multi-Box Region of Interest (ROI) settings
# Các vùng cần OCR - hỗ trợ nhiều box độc lập
roi:
  # Cấu hình bằng file txt (ưu tiên)
  boxes_file: "assets/boxesOCR.txt"

  # Cấu hình inline (sẽ được dùng nếu boxes_file không tồn tại)
  boxes:
    - name: "subtitle"
      x: 370
      y: 930
      w: 1180
      h: 140

# Scene detection settings
# Phát hiện chuyển cảnh để tối ưu OCR
scene_detection:
  # Ngưỡng phát hiện (0-255). Mặc định 30.0
  threshold: 10.0

  # Số frame tối thiểu giữa 2 scene change để tránh OCR nhiễu. Mặc định 10
  min_scene_frames: 1

# OCR settings
ocr:
  # Model sử dụng trên Hugging Face
  model: "deepseek-ai/DeepSeek-OCR-2"

  # Thiết bị: "cuda" (GPU) hoặc "cpu"
  device: "cuda"

  # Batch size cho processing
  batch_size: 4

# Chinese filter settings
# Lọc chỉ giữ text hợp lệ
chinese_filter:
  # Bật/tắt bộ lọc tiếng Trung. (Mặc định: false - lấy text của mọi ngôn ngữ)
  enabled: false

  # Giữ dấu câu tiếng Trung
  keep_punctuation: true

  # Số ký tự tối thiểu để text hợp lệ
  min_char_count: 1

# Output settings
output:
  # Format: "srt" hoặc "txt"
  format: "srt"

  # Có bao gồm timestamp không (chỉ áp dụng cho txt format)
  include_timestamp: true

  # Loại bỏ text trùng lặp liên tiếp
  deduplicate: true

  # Thời lượng mặc định cho mỗi subtitle khi không có text mới (seconds)
  default_duration: 3.0

  # Thời lượng tối thiểu cho một subtitle (seconds)
  min_duration: 1.0

  # Thời lượng tối đa cho một subtitle (seconds)
  max_duration: 7.0
